<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GOATCINE — O Melhor do Cinema</title>
  <meta name="description" content="GOATCINE é a plataforma premium de streaming com os melhores filmes e séries. Design dourado, experiência cinematográfica única." />
  <meta name="theme-color" content="#0A0A0A" />

  <!-- Auth Guard: verifica token JWT com o servidor -->
  <script>
    (function() {
      const token = localStorage.getItem('goatcine_token');
      if (!token) { window.location.replace('/login.html'); return; }
      // Verify token with server asynchronously
      fetch('/api/auth/verify', {
        headers: { Authorization: 'Bearer ' + token }
      }).then(function(r) {
        if (!r.ok) {
          localStorage.removeItem('goatcine_token');
          localStorage.removeItem('goatcine_user');
          window.location.replace('/login.html');
        }
      }).catch(function() {
        // If server is down, allow access with cached user
        const u = localStorage.getItem('goatcine_user');
        if (!u) window.location.replace('/login.html');
      });
    })();
  <\/script>

  <!-- Open Graph -->
  <meta property="og:title" content="GOATCINE — O Melhor do Cinema" />
  <meta property="og:description" content="Plataforma premium de streaming com design dourado." />
  <meta property="og:type" content="website" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

      <!-- Right Actions -->

          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>

  <!-- ========== HERO SECTION ========== -->
  <section class="hero" id="hero" aria-label="Filme em destaque">

    <div class="hero-content">

      <h1 class="hero-title" id="hero-title">Dune: Part Two</h1>
      <div class="hero-meta" id="hero-meta">
        <span class="meta-rating">⭐ 8.5</span>
        <span class="meta-sep">·</span>
        <span class="meta-year">2024</span>
        <span class="meta-sep">·</span>
        <span class="meta-duration">2h 46min</span>
        <span class="meta-sep">·</span>
        <span class="meta-genre">Ficção Científica</span>
      </div>
      <p class="hero-desc" id="hero-desc">
        Paul Atreides se une a Chani e aos Fremen enquanto busca vingança contra os conspiradores que destruíram sua família. Uma épica jornada cinematográfica que redefine o gênero sci-fi.
      </p>
      <div class="hero-actions">
        <button class="btn-primary" id="hero-watch-btn" aria-label="Assistir Dune: Part Two">

          </svg>
          Minha Lista
        </button>
        <button class="btn-info" id="hero-info-btn" aria-label="Mais informações sobre Dune: Part Two">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Hero Indicators -->

      <button class="indicator active" id="indicator-0" aria-label="Slide 1" aria-pressed="true"></button>

    </div>

    <!-- Scroll hint -->

    </div>
  </section>

  <!-- ========== MAIN CONTENT ========== -->
  <main class="main-content" id="main-content">

      </div>

      </div>

        </button>
        <div class="carousel" id="carousel-trending" role="list">
          <!-- Preenchido pelo JS -->

        <button class="carousel-arrow right" id="arrow-right-0" aria-label="Próximo">

            <polyline points="9,18 15,12 9,6"/>
          </svg>

      </div>
    </section>

    <!-- ---- GOATCINE ORIGINAIS BANNER ---- -->

        <button class="btn-primary" id="originals-explore-btn">Explorar Originais</button>
      </div>
      <div class="originals-visual" aria-hidden="true">

    <!-- ---- ROW: Novidades ---- -->

            <p class="modal-desc" id="modal-desc"></p>

        <!-- Similar movies -->

  <!-- ========== LOADING SCREEN ========== -->

    <div class="loading-content">

      </div>
      <div class="loading-bar-wrapper">

    </div>

  <script src="app.js"></script>
