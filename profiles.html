<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GOATCINE — Quem está assistindo?</title>
  <meta name="description" content="Selecione ou crie seu perfil no GOATCINE." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@7.3.0/css/all.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold-primary: #FFD700;
      --gold-dark: #B8860B;
      --gold-glow: rgba(255, 215, 0, 0.35);
      --bg: #080808;
      --text-primary: #F5F5F5;
      --text-secondary: #A0A0A0;
      --border-gold: rgba(255, 215, 0, 0.25);
      --transition: 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    #bg-particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
    .p-dot {
      position: absolute; bottom: -10px; border-radius: 50%;
      background: var(--gold-primary); opacity: 0;
      animation: float-up linear infinite;
    }
    @keyframes float-up {
      0%   { transform: translateY(0) translateX(0); opacity: 0; }
      10%  { opacity: 0.4; }
      90%  { opacity: 0.1; }
      100% { transform: translateY(-100vh) translateX(var(--dx, 30px)); opacity: 0; }
    }

    .profiles-page {
      position: relative; z-index: 1;
      display: flex; flex-direction: column;
      align-items: center; gap: 44px;
      width: 100%; max-width: 960px;
      padding: 48px 24px;
      animation: fade-in 0.6s ease both;
    }
    @keyframes fade-in {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo-wrap { display: flex; align-items: center; gap: 10px; }
    .logo-icon { font-size: 30px; filter: drop-shadow(0 0 12px var(--gold-glow)); }
    .logo-text { font-size: 24px; font-weight: 900; letter-spacing: -0.5px; }
    .logo-text span { color: var(--gold-primary); }

    .page-title {
      font-size: clamp(20px, 4vw, 32px);
      font-weight: 700; letter-spacing: -0.4px;
      text-align: center;
    }

    /* ---- PROFILES GRID ---- */
    #profiles-grid {
      display: flex; flex-wrap: wrap;
      justify-content: center; gap: 28px;
    }

    .profile-card {
      display: flex; flex-direction: column;
      align-items: center; gap: 14px;
      cursor: pointer;
      transition: transform var(--transition);
      position: relative;
    }
    .profile-card:hover { transform: scale(1.08); }
    .profile-card:hover .profile-avatar {
      border-color: var(--gold-primary);
      box-shadow: 0 0 28px var(--gold-glow);
    }
    .profile-avatar {
      width: 120px; height: 120px;
      border-radius: 16px;
      border: 3px solid rgba(255,215,0,0.15);
      display: flex; align-items: center; justify-content: center;
      font-size: 52px;
      overflow: hidden;
      transition: border-color var(--transition), box-shadow var(--transition);
    }
    .profile-avatar img, .preview-avatar img, .avatar-image-btn img {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }
    .profile-name {
      font-size: 15px; font-weight: 500; color: var(--text-secondary);
      transition: color var(--transition); text-align: center;
      max-width: 120px; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap;
    }
    .profile-card:hover .profile-name { color: var(--text-primary); }

    .profile-delete-btn {
      display: none; position: absolute; top: -9px; right: -9px;
      width: 26px; height: 26px; border-radius: 50%;
      background: #E53935; border: 2px solid var(--bg);
      color: white; font-size: 13px; cursor: pointer;
      align-items: center; justify-content: center;
      z-index: 10; transition: background 0.2s ease, transform 0.15s ease;
    }
    .profile-delete-btn:hover { background: #B71C1C; transform: scale(1.15); }
    body.manage-mode .profile-delete-btn { display: flex; }
    body.manage-mode .profile-card { cursor: default; }
    body.manage-mode .profile-card:hover { transform: none; }
    body.manage-mode .profile-card:hover .profile-avatar { border-color: rgba(255,215,0,0.15); box-shadow: none; }

    /* Add profile card */
    .add-profile-card {
      display: flex; flex-direction: column;
      align-items: center; gap: 14px;
      cursor: pointer; transition: transform var(--transition);
    }
    .add-profile-card:hover { transform: scale(1.08); }
    .add-profile-avatar {
      width: 120px; height: 120px; border-radius: 16px;
      border: 3px dashed rgba(255,215,0,0.2);
      display: flex; align-items: center; justify-content: center;
      font-size: 40px; color: rgba(255,215,0,0.35);
      transition: border-color var(--transition), color var(--transition), background var(--transition);
    }
    .add-profile-card:hover .add-profile-avatar {
      border-color: var(--gold-primary); color: var(--gold-primary);
      background: rgba(255,215,0,0.05);
    }
    .add-profile-name {
      font-size: 15px; font-weight: 500; color: var(--text-secondary);
      transition: color var(--transition);
    }
    .add-profile-card:hover .add-profile-name { color: var(--text-primary); }
    body.manage-mode .add-profile-card { display: none; }

    /* Manage button */
    .manage-btn {
      font-size: 13px; font-weight: 600; letter-spacing: 0.5px;
      text-transform: uppercase; color: var(--text-secondary);
      border: 1px solid rgba(255,255,255,0.12); background: transparent;
      padding: 10px 28px; border-radius: 8px; cursor: pointer;
      transition: color var(--transition), border-color var(--transition), background var(--transition);
    }
    .manage-btn:hover, .manage-btn.active {
      color: var(--gold-primary); border-color: var(--gold-primary);
      background: rgba(255,215,0,0.06);
    }

    /* ---- SELECT PANEL ---- */
    .select-panel { display: flex; flex-direction: column; align-items: center; gap: 28px; width: 100%; }
    .select-panel.hidden { display: none; }

    /* ---- CREATE PANEL ---- */
    .create-panel {
      display: none; flex-direction: column;
      align-items: center; gap: 28px;
      width: 100%; max-width: 480px;
      animation: fade-in 0.4s ease both;
    }
    .create-panel.active { display: flex; }

    .create-title { font-size: 22px; font-weight: 700; text-align: center; }

    .preview-avatar {
      width: 110px; height: 110px; border-radius: 16px;
      border: 3px solid var(--gold-primary);
      box-shadow: 0 0 28px var(--gold-glow);
      display: flex; align-items: center; justify-content: center;
      font-size: 52px; overflow: hidden; transition: background 0.3s ease;
    }

    .create-input-wrap { width: 100%; }
    .create-input-wrap label, .emoji-picker-wrap label, .color-picker-wrap label {
      display: block; font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.8px;
      color: var(--text-secondary); margin-bottom: 10px;
    }
    .create-input {
      width: 100%;
      background: rgba(255,255,255,0.05);
      border: 1.5px solid rgba(255,215,0,0.2);
      border-radius: 10px; padding: 12px 16px;
      font-size: 15px; font-family: 'Inter', sans-serif;
      color: var(--text-primary); outline: none;
      transition: border-color var(--transition);
    }
    .create-input:focus { border-color: var(--gold-primary); }
    .create-input::placeholder { color: rgba(255,255,255,0.28); }

    .emoji-picker-wrap, .color-picker-wrap { width: 100%; }
    .emoji-grid { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
    .emoji-btn {
      width: 44px; height: 44px; border-radius: 10px;
      border: 2px solid transparent;
      background: rgba(255,255,255,0.05);
      font-size: 22px; cursor: pointer;
      transition: border-color 0.2s, background 0.2s, transform 0.15s;
      display: flex; align-items: center; justify-content: center;
    }
    .emoji-btn:hover { background: rgba(255,215,0,0.1); transform: scale(1.1); }
    .emoji-btn.selected { border-color: var(--gold-primary); background: rgba(255,215,0,0.12); }
    .avatar-image-btn {
      overflow: hidden;
      padding: 0;
    }

    .color-grid { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
    .color-btn {
      width: 36px; height: 36px; border-radius: 50%;
      border: 3px solid transparent; cursor: pointer;
      transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
    }
    .color-btn:hover { transform: scale(1.18); }
    .color-btn.selected { border-color: white; box-shadow: 0 0 0 2px rgba(255,255,255,0.45); }

    .kid-toggle-wrap {
      display: flex; align-items: center; gap: 12px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 10px; padding: 14px 16px; width: 100%;
    }
    .kid-info { flex: 1; }
    .kid-info span { font-size: 14px; font-weight: 500; color: var(--text-secondary); display: block; }
    .kid-info small { font-size: 11px; color: rgba(255,255,255,0.28); margin-top: 2px; display: block; }
    .toggle-switch {
      width: 44px; height: 24px; background: rgba(255,255,255,0.1);
      border-radius: 12px; position: relative; cursor: pointer;
      transition: background 0.25s ease; flex-shrink: 0;
    }
    .toggle-switch.on { background: var(--gold-primary); }
    .toggle-knob {
      position: absolute; top: 2px; left: 2px;
      width: 20px; height: 20px; border-radius: 50%;
      background: white; transition: left 0.25s ease;
    }
    .toggle-switch.on .toggle-knob { left: 22px; }

    .create-error { font-size: 13px; color: #FF6B6B; text-align: center; min-height: 18px; }

    .create-actions { display: flex; gap: 12px; width: 100%; }
    .btn-primary {
      flex: 1; padding: 14px;
      background: linear-gradient(135deg, var(--gold-dark), var(--gold-primary));
      color: #000; font-weight: 800; font-size: 15px;
      border: none; border-radius: 12px; cursor: pointer;
      transition: opacity 0.2s, transform 0.2s;
    }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-secondary {
      padding: 14px 20px;
      background: rgba(255,255,255,0.06);
      color: var(--text-secondary);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px; font-size: 14px; font-weight: 600;
      cursor: pointer; transition: background 0.2s, color 0.2s;
    }
    .btn-secondary:hover { background: rgba(255,255,255,0.1); color: var(--text-primary); }

    .required-badge {
      display: inline-block; padding: 4px 14px;
      background: rgba(255,215,0,0.1);
      border: 1px solid var(--border-gold);
      border-radius: 20px; font-size: 12px; font-weight: 600;
      color: var(--gold-primary); letter-spacing: 0.4px;
    }

    .divider {
      width: 60px; height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold-primary), transparent);
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    .btn-loading {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid rgba(0,0,0,0.3); border-top-color: #000;
      border-radius: 50%; animation: spin 0.6s linear infinite;
      vertical-align: middle;
    }

    @media (max-width: 600px) {
      .profile-avatar, .add-profile-avatar { width: 90px; height: 90px; font-size: 36px; border-radius: 12px; }
      .profiles-page { gap: 32px; padding: 32px 16px; }
    }
  </style>
</head>
<body>
  <div id="bg-particles"></div>

  <div class="profiles-page">
    <div class="logo-wrap">
      <span class="logo-icon">🏆</span>
      <div class="logo-text">GOAT<span>CINE</span></div>
    </div>

    <!-- SELECT PANEL -->
    <div class="select-panel" id="select-panel">
      <h1 class="page-title" id="select-title">Quem está assistindo?</h1>
      <div id="profiles-grid"></div>
      <div class="create-error" id="select-error"></div>
      <button class="manage-btn" id="manage-btn">Gerenciar Perfis</button>
    </div>

    <!-- CREATE PANEL -->
    <div class="create-panel" id="create-panel">
      <div style="text-align:center;">
        <h2 class="create-title" id="create-title">Criar Perfil</h2>
        <p id="required-msg" style="margin-top:10px; display:none;">
          <span class="required-badge">⚠️ Crie um perfil para continuar</span>
        </p>
      </div>

      <div class="divider"></div>
      <div class="preview-avatar" id="preview-avatar" style="background:#1a1a1a;">🎬</div>

      <div class="create-input-wrap">
        <label for="profile-name-input">Nome do Perfil</label>
        <input type="text" id="profile-name-input" class="create-input" placeholder="Ex: Pedro, Família, Kids..." maxlength="20" autocomplete="off" />
      </div>

      <div class="emoji-picker-wrap">
        <label>Avatar</label>
        <div class="emoji-grid" id="emoji-grid"></div>
      </div>

      <div class="color-picker-wrap">
        <label>Cor do Avatar</label>
        <div class="color-grid" id="color-grid"></div>
      </div>

      <div class="kid-toggle-wrap">
        <div class="kid-info">
          <span>Perfil Infantil</span>
          <small>Oculta conteúdo adulto</small>
        </div>
        <div class="toggle-switch" id="kid-toggle" role="switch" aria-checked="false" tabindex="0">
          <div class="toggle-knob"></div>
        </div>
      </div>

      <div class="create-error" id="create-error"></div>

      <div class="create-actions">
        <button class="btn-secondary" id="create-cancel-btn" style="display:none;">Cancelar</button>
        <button class="btn-primary" id="create-submit-btn">Criar Perfil</button>
      </div>
    </div>
  </div>

  <script src="profiles.js"></script>
</body>
</html>
